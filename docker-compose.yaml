version: '3.9'

services:
  postgres:
    image: postgres
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${db_login}
      POSTGRES_PASSWORD: ${db_password}
      POSTGRES_DB: ${db_name}
    ports:
      - '5433:5432'
    volumes:
      - ./postgres_db/pgdata/:/var/lib/postgresql/data